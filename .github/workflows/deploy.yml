name: HEADZ UP — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. BACKEND CHECKS ────────────────────────────────────────────────────────
  backend-check:
    name: Backend — lint & migrate check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACKEND

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-real
          DEBUG: "True"
        run: python manage.py migrate --run-syncdb --noinput

      - name: Verify no unapplied model changes
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-real
          DEBUG: "True"
        run: |
          python manage.py makemigrations --check --dry-run
          echo "✓ No unapplied model changes"

      - name: Django system check
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-real
          DEBUG: "True"
        run: python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true

  # ── 2. FRONTEND CHECKS ───────────────────────────────────────────────────────
  frontend-check:
    name: Frontend — build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FRONTEND/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FRONTEND/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js build check
        env:
          NEXT_PUBLIC_API_URL: https://headzup-barbershop-website-production.up.railway.app/api
        run: npm run build

  # ── 3. DEPLOY (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy — notify
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Summary
        run: |
          echo "## HEADZ UP Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Vercel (auto-deploy on push) | ✅ Triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | Railway (auto-deploy on push) | ✅ Triggered |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Vercel and Railway both auto-deploy from main — no manual step needed." >> $GITHUB_STEP_SUMMARY
          echo "Migration 0019 and reminder cron start automatically via start.sh." >> $GITHUB_STEP_SUMMARY
